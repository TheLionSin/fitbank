services:
  # --- БАЗА ДАННЫХ ДЛЯ АКТИВНОСТЕЙ ---
  activity-db:
    image: postgres:15-alpine
    container_name: activity-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activity_db
    ports:
      - "5433:5432" # Пробрасываем на 5433, чтобы не конфликтовать с локальным Postgres
    healthcheck: # Проверка, что база реально готова принимать запросы
      test: ["CMD-SHELL","pg_isready -U postgres -d activity_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  # --- СЕРВИС АКТИВНОСТЕЙ ---
  activity-service:
    build:
      context: ./activity-service
      dockerfile: Dockerfile
    container_name: activity-service
    environment:
    # Внутри сети Docker мы обращаемся к базе по имени сервиса 'activity-db'
      - DB_URL=postgres://postgres:postgres@activity-db:5432/activity_db?sslmode=disable
    ports:
      - "8080:8080" # HTTP (Метрики)
      - "50051:50051" #gRPC
    depends_on:
      activity-db:
        condition: service_healthy # Ждем, пока база полностью проснется

# --- БАЗА ДАННЫХ ДЛЯ ПИТАНИЯ ---
  nutrition-db:
    image: postgres:15-alpine
    container_name : nutrition-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nutrition_db
    ports:
      - "5434:5432" # Пробрасываем на 5434
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d nutrition_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- СЕРВИС ПИТАНИЯ ---
  nutrition-service:
    build:
      context: ./nutrition-service
      dockerfile: Dockerfile
    container_name: nutrition-service
    environment:
      - DB_URL=postgres://postgres:postgres@nutrition-db:5432/nutrition_db?sslmode=disable
      # КРИТИЧНО: указываем адрес первого сервиса по его имени в сети Docker
      - ACTIVITY_SERVICE_ADDR=activity-service:50051
    ports:
      - "8081:8081" # HTTP (Metrics)
      - "50052:50052" # gRPC
    depends_on:
      nutrition-db:
        condition: service_healthy
      activity-service:
        condition: service_started

# Описываем общую сеть, чтобы сервисы видели друг друга по именам
networks:
  default:
    name: fitbank-network